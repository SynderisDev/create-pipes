name: Publish to Modrinth

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: Modrinth version type
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - release

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and publish
        run: ./gradlew build modrinth --stacktrace
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_VERSION_TYPE: ${{ inputs.version_type }}
